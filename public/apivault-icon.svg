<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0A0B0D" rx="24"/>
  <g transform="translate(46, 46)">
    <rect x="0" y="0" width="48" height="48" rx="12" fill="#00FF88" opacity="1.0" filter="url(#glow)"/>
    <rect x="58" y="0" width="48" height="48" rx="12" fill="#00FF88" opacity="0.72"/>
    <rect x="0" y="58" width="48" height="48" rx="12" fill="#00FF88" opacity="0.48"/>
    <rect x="58" y="58" width="48" height="48" rx="12" fill="#00FF88" opacity="0.28"/>
  </g>
</svg>