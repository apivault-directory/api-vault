name: Verify Providers

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Fetch popularity (GitHub stars)
        run: npm run fetch-popularity
        env:
          GITHUB_TOKEN: ${{ secrets.POPULARITY_GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run health checks
        run: npm run health-check
        env:
          HEALTH_TIMEOUT_MS: "10000"
          HEALTH_DELAY_MS: "600"

      - name: Commit results
        run: |
          git config user.name  "apivault-bot"
          git config user.email "apivaultdirectory@gmail.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update health & popularity data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push origin HEAD:main
